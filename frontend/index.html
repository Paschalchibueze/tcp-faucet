<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCP Faucet — CrypticalPTestToken</title>

    <!--
      CONTENT SECURITY POLICY — fully hardened
      Sources confirmed from:
        - hCaptcha official docs: https://docs.hcaptcha.com/#content-security-policy-settings
        - MDN CSP reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy

      KEY DECISIONS:
      1. 'unsafe-eval' REMOVED from global scope entirely.
         Per hCaptcha docs: unsafe-eval scoped to hCaptcha domains is OPTIONAL
         and only for enterprise accounts enabling additional verification.
         Our account is standard — it is not required.

      2. Wildcard https://*.hcaptcha.com used across all hCaptcha directives.
         Per hCaptcha docs: "do not hard-code specific subdomains like
         newassets.hcaptcha.com — asset subdomains may vary over time or by region."

      3. object-src 'none' added — blocks Flash and plugin execution (OWASP A05).

      4. base-uri 'self' added — prevents base tag hijacking attacks (OWASP A03).

      5. form-action 'self' added — prevents form hijacking to external origins.

      6. upgrade-insecure-requests added — forces HTTP→HTTPS upgrade on all requests.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'none';
        script-src 'self' https://hcaptcha.com https://*.hcaptcha.com 'unsafe-inline';
        style-src 'self' https://fonts.googleapis.com https://hcaptcha.com https://*.hcaptcha.com 'unsafe-inline';
        font-src https://fonts.gstatic.com;
        connect-src 'self' https://hcaptcha.com https://*.hcaptcha.com https://tcp-faucet-backend.onrender.com;
        frame-src https://hcaptcha.com https://*.hcaptcha.com;
        img-src 'self' data: https://hcaptcha.com https://*.hcaptcha.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
      "
    />

    <!-- Referrer Policy — no URL leakage to third parties -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Permissions Policy — disable unused browser APIs -->
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), payment=()"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
